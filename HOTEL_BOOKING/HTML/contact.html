<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us — LuxeStay</title>
    <meta name="description" content="Get in touch with LuxeStay. Questions about destinations, pricing, or bookings? Our team is ready to help.">
    <link rel="stylesheet" href="../CSS/global.css">
    <link rel="stylesheet" href="../CSS/contact.css">
</head>
<body>
    <main id="main-content" class="contact-container">
        <h1>Contact Us</h1>
        <p class="contact-intro">We'd love to hear from you! Whether you have a question about our destinations, pricing, or anything else, our team is ready to answer all your questions.</p>

        <div class="contact-info">
            <div class="contact-info-item card">
                <h3>📧 Email</h3>
                <p><a href="mailto:info@cskhotels.com">info@cskhotels.com</a></p>
            </div>
            <div class="contact-info-item card">
                <h3>📞 Phone</h3>
                <p><a href="tel:+917777777777">+91 7777777777</a></p>
            </div>
            <div class="contact-info-item card">
                <h3>📍 Address</h3>
                <p>Vashishta Bhavanam, Amrita Vishwa Vidyapeetam</p>
            </div>
        </div>

        <form class="contact-form card" action="submit.html" method="GET">
            <div class="form-group">
                <label for="contact-name">Name <span class="required">*</span></label>
                <input type="text" id="contact-name" name="name" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label for="contact-email">Email <span class="required">*</span></label>
                <input type="email" id="contact-email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="contact-message">Message <span class="required">*</span></label>
                <textarea id="contact-message" name="message" rows="5" placeholder="How can we help?" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
    </main>

    <script src="../JS/components.js"></script>
</body>
</html>
