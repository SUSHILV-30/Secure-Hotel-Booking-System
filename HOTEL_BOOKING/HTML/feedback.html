<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback — LuxeStay</title>
    <meta name="description" content="Share your feedback with LuxeStay. Help us improve our services and provide you with a better booking experience.">
    <link rel="stylesheet" href="../CSS/global.css">
    <link rel="stylesheet" href="../CSS/feedback.css">
</head>
<body>
    <main id="main-content">
        <header class="feedback-header">
            <h1>Feedback Form</h1>
        </header>

        <form action="submit.html" onsubmit="return validateFeedbackForm()" method="GET" class="feedback-form card">
            <div class="form-group">
                <label for="feedback-name">Name <span class="required">*</span></label>
                <input type="text" id="feedback-name" name="name" placeholder="Your Name" maxlength="50" required>
            </div>
            <div class="form-group">
                <label for="feedback-email">Email <span class="required">*</span></label>
                <input type="email" id="feedback-email" name="email" placeholder="you@example.com" maxlength="50" required>
            </div>
            <div class="form-group">
                <label for="feedback-text">Feedback <span class="required">*</span></label>
                <textarea id="feedback-text" name="feedback" rows="5" placeholder="Tell us about your experience..." maxlength="500" required></textarea>
            </div>
            <div class="button-group">
                <button type="submit" class="btn btn-primary">Submit</button>
                <button type="reset" class="btn btn-outline">Reset</button>
            </div>
        </form>
    </main>

    <script src="../JS/components.js"></script>
    <script src="../JS/validation.js"></script>
</body>
</html>
